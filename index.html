<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Message Board</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        textarea { width: 100%; height: 80px; background: #1e1e1e; border: 1px solid #333; color: white; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #3d5afe; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .msg { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid #3d5afe; }
    </style>
</head>
<body>

<div class="container">
    <h2>Message Board</h2>
    <textarea id="mainInput" placeholder="What's happening?"></textarea>
    <button onclick="send()">Post Message</button>
    <div id="board"></div>
</div>

<script>
    const SB_URL = "https://vumkbcjohulelevjnjcv.supabase.co";
    const SB_KEY = "YOUR_ANON_KEY_HERE";
    const client = supabase.createClient(SB_URL, SB_KEY);

    async function send() {
        const text = document.getElementById('mainInput').value;
        if(!text) return;
        await client.from('messages').insert([{ content: text }]);
        document.getElementById('mainInput').value = '';
    }

    async function load() {
        const { data } = await client.from('messages').select('*').order('created_at', { ascending: false });
        if(data) {
            document.getElementById('board').innerHTML = data.map(m => `<div class="msg">${m.content}</div>`).join('');
        }
    }

    // THIS PART MAKES IT "REALTIME"
    client.channel('schema-db-changes')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
        load(); // Refresh when a new message arrives!
    }).subscribe();

    load();
</script>
</body>
</html>
